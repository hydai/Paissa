version: '3.8'

services:
  paissa-server:
    build: .
    container_name: paissa-server
    environment:
      # Change this to your desired port
      - PORT=8000
    ports:
      # Map host port to container port (host:container)
      # Change the first number to map to a different host port
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

